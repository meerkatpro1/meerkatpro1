<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Started — meerkatpro1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d1a;
      color: #ccc;
    }

    nav {
      background: #1a1a2e;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    nav .logo { color: #943030; font-size: 1.2rem; font-weight: 700; text-decoration: none; }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav ul a { color: #ccc; text-decoration: none; font-size: 0.95rem; transition: color 0.2s; }
    nav ul a:hover { color: #fff; }

    .game-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      min-height: calc(100vh - 60px);
      padding: 2rem;
      flex-wrap: wrap;
    }

    .maze-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .hud {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      font-size: 0.9rem;
      color: #667;
    }
    .hud .level-badge {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      padding: 0.3rem 0.8rem;
      color: #aac4e0;
      letter-spacing: 0.05em;
    }
    .hud .level-badge span { color: #fff; font-weight: 700; font-size: 1rem; }
    .hud .points-badge {
      background: #1a2e1a;
      border: 1px solid #2a4a2a;
      border-radius: 4px;
      padding: 0.3rem 0.8rem;
      color: #a0d4a0;
      letter-spacing: 0.05em;
    }
    .hud .points-badge span { color: #6fcf6f; font-weight: 700; font-size: 1rem; }
    #statusMsg { font-size: 0.82rem; min-width: 180px; }

    .level-timer {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      text-align: center;
      width: 100%;
    }
    .level-timer .timer-label {
      font-size: 0.65rem;
      color: #445;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }
    .level-timer .timer-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #aac4e0;
      font-variant-numeric: tabular-nums;
    }

    canvas {
      border: 2px solid #1a1a2e;
      border-radius: 4px;
      display: block;
    }

    .controls-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .controls-label {
      font-size: 0.72rem;
      color: #445;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 54px);
      grid-template-rows: repeat(3, 54px);
      gap: 5px;
    }

    .dpad button {
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 6px;
      color: #aac4e0;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.1s, transform 0.08s;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .dpad button:hover  { background: #22224a; border-color: #4a4a8a; }
    .dpad button:active { background: #2d2d6a; transform: scale(0.92); }

    .dpad .btn-up    { grid-column: 2; grid-row: 1; }
    .dpad .btn-left  { grid-column: 1; grid-row: 2; }
    .dpad .btn-right { grid-column: 3; grid-row: 2; }
    .dpad .btn-down  { grid-column: 2; grid-row: 3; }

    .reset-btn {
      background: #2a1a1a;
      border: 2px solid #4a2a2a;
      border-radius: 6px;
      color: #e94560;
      font-size: 0.8rem;
      padding: 0.5rem 1.4rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }
    .reset-btn:hover { background: #3a2020; }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      font-size: 0.78rem;
      color: #556;
    }
    .legend-item { display: flex; align-items: center; gap: 0.55rem; }
    .dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
    .sq  { width: 13px; height: 13px; border-radius: 2px; flex-shrink: 0; }

    /* ── Death screen overlay ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.visible { display: flex; }

    .death-card {
      background: #12121f;
      border: 2px solid #e94560;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      box-shadow: 0 0 40px rgba(233, 69, 96, 0.3);
      animation: pop-in 0.2s ease-out;
    }
    @keyframes pop-in {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .death-card h2 {
      font-size: 1.8rem;
      color: #e94560;
      letter-spacing: 0.02em;
    }

    .death-card .stat-row {
      display: flex;
      gap: 2.5rem;
    }

    .death-card .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }
    .death-card .stat-label {
      font-size: 0.72rem;
      color: #556;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .death-card .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
    }

    .play-again-btn {
      margin-top: 0.5rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.75rem 2.2rem;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, transform 0.1s;
    }
    .play-again-btn:hover  { background: #c73652; }
    .play-again-btn:active { transform: scale(0.96); }

    .highscore-box {
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 0.9rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }
    .highscore-box .hs-emoji {
      font-size: 2rem;
      line-height: 1;
    }
    .highscore-box .hs-text {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      text-align: left;
    }
    .highscore-box .hs-label {
      font-size: 0.65rem;
      color: #445;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .highscore-box .hs-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: #aac4e0;
    }
    .highscore-box .hs-value.new-record {
      color: #ffd700;
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="index.html">meerkatpro1</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <div class="game-wrapper">

    <div class="maze-panel">
      <div class="hud">
        <div class="level-badge">Level <span id="levelDisplay">1</span></div>
        <div class="points-badge">Points <span id="pointsDisplay">0</span></div>
        <div id="statusMsg" style="color:#667;">Find the orange exit</div>
      </div>
      <canvas id="mazeCanvas" width="480" height="480"></canvas>
    </div>

    <div class="controls-panel">
      <div class="level-timer">
        <div class="timer-label">Level Time</div>
        <div class="timer-value" id="timerDisplay">0.0s</div>
      </div>
      <div class="controls-label">Controls</div>
      <div class="dpad">
        <button class="btn-up"    onclick="tryMove(0,-1)">&#8593;</button>
        <button class="btn-left"  onclick="tryMove(-1,0)">&#8592;</button>
        <button class="btn-right" onclick="tryMove(1,0)">&#8594;</button>
        <button class="btn-down"  onclick="tryMove(0,1)">&#8595;</button>
      </div>
      <button class="reset-btn" onclick="resetGame()">Reset</button>
      <div class="legend">
        <div class="legend-item"><div class="dot" style="background:#e94560;"></div> You</div>
        <div class="legend-item"><div class="dot" style="background:#9b59b6;"></div> Enemy</div>
        <div class="legend-item"><div class="sq"  style="background:#ff8c00;"></div> Exit</div>
        <div class="legend-item"><div class="sq"  style="background:#1e1e3a; border:1px solid #2a2a5a;"></div> Path</div>
      </div>
    </div>

  </div>

  <!-- Death screen -->
  <div class="overlay" id="deathOverlay">
    <div class="death-card">
      <h2>Caught!</h2>
      <div class="stat-row">
        <div class="stat">
          <div class="stat-label">Final Score</div>
          <div class="stat-value" id="finalScore">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Levels Cleared</div>
          <div class="stat-value" id="finalLevels">0</div>
        </div>
      </div>
      <div class="highscore-box">
        <div class="hs-emoji" id="hsEmoji">🏆</div>
        <div class="hs-text">
          <div class="hs-label">High Score</div>
          <div class="hs-value" id="hsValue">0</div>
        </div>
      </div>
      <button class="play-again-btn" onclick="playAgain()">Play Again</button>
    </div>
  </div>

  <script>
    const ROWS = 10, COLS = 10, CELL = 48, WALL = 4;

    const canvas      = document.getElementById('mazeCanvas');
    const ctx         = canvas.getContext('2d');
    const levelEl     = document.getElementById('levelDisplay');
    const statusEl    = document.getElementById('statusMsg');
    const pointsEl    = document.getElementById('pointsDisplay');
    const timerEl     = document.getElementById('timerDisplay');

    let maze, explored, player, enemy, exitR, exitC, level, gameActive, enemyInterval;
    let lastMoveTime = 0;
    const MOVE_COOLDOWN = 130; // ms between player moves
    let enemyPulsing = false, pulseInterval, pulseOffTimeout;
    let totalPoints = 0, levelStartTime = 0, timerInterval;

    function calcPoints(elapsedMs) {
      const t = elapsedMs / 1000;
      if (t <= 3)  return 100;
      if (t >= 20) return 0;
      return Math.round(100 * (20 - t) / 17);
    }

    // ── Maze generation: DFS + extra wall removal for open rooms ─────────────
    function generateMaze() {
      const walls = Array.from({length: ROWS}, () =>
        Array.from({length: COLS}, () =>
          ({top: true, right: true, bottom: true, left: true})
        )
      );
      const visited = Array.from({length: ROWS}, () => Array(COLS).fill(false));
      const stack = [[0, 0]];
      visited[0][0] = true;

      // Iterative DFS — guarantees full connectivity
      while (stack.length > 0) {
        const [r, c] = stack[stack.length - 1];
        const nbrs = [
          {dr: -1, dc:  0, w: 'top',    ow: 'bottom'},
          {dr:  1, dc:  0, w: 'bottom', ow: 'top'},
          {dr:  0, dc: -1, w: 'left',   ow: 'right'},
          {dr:  0, dc:  1, w: 'right',  ow: 'left'},
        ].filter(({dr, dc}) => {
          const nr = r + dr, nc = c + dc;
          return nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc];
        });

        if (nbrs.length === 0) {
          stack.pop();
        } else {
          const pick = nbrs[Math.floor(Math.random() * nbrs.length)];
          const nr = r + pick.dr, nc = c + pick.dc;
          walls[r][c][pick.w]    = false;
          walls[nr][nc][pick.ow] = false;
          visited[nr][nc] = true;
          stack.push([nr, nc]);
        }
      }

      // Remove ~45% of remaining interior walls to create large rooms + multiple paths
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (c + 1 < COLS && walls[r][c].right && Math.random() < 0.45) {
            walls[r][c].right   = false;
            walls[r][c+1].left  = false;
          }
          if (r + 1 < ROWS && walls[r][c].bottom && Math.random() < 0.45) {
            walls[r][c].bottom    = false;
            walls[r+1][c].top     = false;
          }
        }
      }

      return walls;
    }

    // ── Random exit placement (Euclidean radius > 2 from player spawn) ────────
    function pickExit() {
      let r, c;
      do {
        r = Math.floor(Math.random() * ROWS);
        c = Math.floor(Math.random() * COLS);
      } while (r * r + c * c <= 4);  // exclude within radius 2 of (0,0)
      return {r, c};
    }

    // ── Random enemy placement (Euclidean radius > 3 from player spawn) ───────
    function pickEnemy() {
      let r, c;
      do {
        r = Math.floor(Math.random() * ROWS);
        c = Math.floor(Math.random() * COLS);
      } while (r * r + c * c <= 9 || (r === exitR && c === exitC));  // exclude within radius 3 of (0,0) and exit cell
      return {r, c};
    }

    // ── Enemy speed (ms per move): slow at level 1, ramps up each level ───────
    function enemySpeed() {
      return Math.max(150, 1800 - (level - 1) * 120);
    }

    // ── BFS pathfinding for enemy ─────────────────────────────────────────────
    function bfsNextStep(fromR, fromC, toR, toC) {
      if (fromR === toR && fromC === toC) return null;
      const parent = Array.from({length: ROWS}, () => Array(COLS).fill(null));
      parent[fromR][fromC] = [fromR, fromC];
      const queue = [[fromR, fromC]];
      let found = false;

      outer: while (queue.length > 0) {
        const [r, c] = queue.shift();
        const dirs = [
          {nr: r-1, nc: c,   blocked: maze[r][c].top},
          {nr: r+1, nc: c,   blocked: maze[r][c].bottom},
          {nr: r,   nc: c-1, blocked: maze[r][c].left},
          {nr: r,   nc: c+1, blocked: maze[r][c].right},
        ];
        for (const {nr, nc, blocked} of dirs) {
          if (!blocked && nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !parent[nr][nc]) {
            parent[nr][nc] = [r, c];
            if (nr === toR && nc === toC) { found = true; break outer; }
            queue.push([nr, nc]);
          }
        }
      }

      if (!found) return null;

      // Trace back to find the first step from `from`
      let [r, c] = [toR, toC];
      while (!(parent[r][c][0] === fromR && parent[r][c][1] === fromC)) {
        [r, c] = parent[r][c];
      }
      return {r, c};
    }

    // ── Fog of war ────────────────────────────────────────────────────────────
    function markExplored(r, c) {
      // Mark this cell and its 4 neighbours as visible
      [[r,c],[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr, nc]) => {
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) explored[nr][nc] = true;
      });
    }

    // ── Drawing ───────────────────────────────────────────────────────────────
    const COLOR_WALL  = '#09090f';
    const COLOR_FLOOR = '#1e1e3a';
    const COLOR_EXIT  = '#ff8c00';

    function drawFloorCell(r, c, color) {
      const x = c * CELL, y = r * CELL;
      const w = maze[r][c];
      const lt = w.left   ? WALL : 0;
      const rt = w.right  ? WALL : 0;
      const tt = w.top    ? WALL : 0;
      const bt = w.bottom ? WALL : 0;
      ctx.fillStyle = color;
      ctx.fillRect(x + lt, y + tt, CELL - lt - rt, CELL - tt - bt);
    }

    function drawPlayer() {
      const cx = player.c * CELL + CELL / 2;
      const cy = player.r * CELL + CELL / 2;
      const rad = CELL * 0.33;

      // Body
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(cx, cy, rad, 0, Math.PI * 2);
      ctx.fill();

      // Directional arrow (triangle pointing outward from circle edge)
      const dx = player.dir === 'right' ? 1 : player.dir === 'left'  ? -1 : 0;
      const dy = player.dir === 'down'  ? 1 : player.dir === 'up'    ? -1 : 0;
      const px = dy, py = -dx;           // perpendicular unit vector

      const tipD  = rad + CELL * 0.20;   // tip distance from center
      const baseD = rad * 0.45;          // base distance from center
      const bHalf = CELL * 0.17;         // half-width of arrow base

      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(cx + dx * tipD,                     cy + dy * tipD);
      ctx.lineTo(cx + dx * baseD + px * bHalf,       cy + dy * baseD + py * bHalf);
      ctx.lineTo(cx + dx * baseD - px * bHalf,       cy + dy * baseD - py * bHalf);
      ctx.closePath();
      ctx.fill();
    }

    function drawEnemy() {
      if (!explored[enemy.r][enemy.c]) return;
      const cx = enemy.c * CELL + CELL / 2;
      const cy = enemy.r * CELL + CELL / 2;
      const rad = CELL * 0.32;

      ctx.fillStyle = '#9b59b6';
      ctx.beginPath();
      ctx.arc(cx, cy, rad, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#e8c1f4';
      ctx.font = `bold ${Math.floor(CELL * 0.38)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('!', cx, cy);
    }

    function draw() {
      // Background (walls show through as this color)
      ctx.fillStyle = COLOR_WALL;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (!explored[r][c]) continue;
          const isExit = (r === exitR && c === exitC);
          drawFloorCell(r, c, isExit ? COLOR_EXIT : COLOR_FLOOR);
        }
      }

      // Enemy pulse — draws even through fog of war
      if (enemyPulsing) {
        const x = enemy.c * CELL, y = enemy.r * CELL;
        const w = maze[enemy.r][enemy.c];
        ctx.fillStyle = 'rgba(220, 40, 40, 0.9)';
        ctx.fillRect(
          x + (w.left   ? WALL : 0),
          y + (w.top    ? WALL : 0),
          CELL - (w.left ? WALL : 0) - (w.right  ? WALL : 0),
          CELL - (w.top  ? WALL : 0) - (w.bottom ? WALL : 0)
        );
      }

      drawEnemy();
      drawPlayer();
    }

    // ── Game events ───────────────────────────────────────────────────────────
    function caught() {
      gameActive = false;
      clearAllTimers();
      draw();

      // High score (persisted in localStorage)
      const prevBest = parseInt(localStorage.getItem('mazeRunHighScore') || '0', 10);
      const isNewRecord = totalPoints > prevBest;
      const highScore = isNewRecord ? totalPoints : prevBest;
      if (isNewRecord) localStorage.setItem('mazeRunHighScore', highScore);

      // Pick emoji based on proximity to high score
      let emoji;
      if (isNewRecord && totalPoints > 0) {
        emoji = '🏆';
      } else if (prevBest === 0 || totalPoints === 0) {
        emoji = '💀';
      } else {
        const ratio = totalPoints / prevBest; // 1.0 = matched, 0 = nothing
        if      (ratio >= 0.95) emoji = '😮';
        else if (ratio >= 0.75) emoji = '😅';
        else if (ratio >= 0.50) emoji = '😔';
        else                    emoji = '😢';
      }

      document.getElementById('finalScore').textContent  = totalPoints;
      document.getElementById('finalLevels').textContent = level - 1;
      document.getElementById('hsEmoji').textContent     = emoji;
      const hsValueEl = document.getElementById('hsValue');
      hsValueEl.textContent = highScore;
      hsValueEl.className   = 'hs-value' + (isNewRecord ? ' new-record' : '');
      document.getElementById('deathOverlay').classList.add('visible');
    }

    function playAgain() {
      document.getElementById('deathOverlay').classList.remove('visible');
      level = 1; levelEl.textContent = level;
      totalPoints = 0; pointsEl.textContent = 0;
      initGame();
    }

    function win() {
      gameActive = false;
      clearAllTimers();
      const earned = calcPoints(performance.now() - levelStartTime);
      totalPoints += earned;
      pointsEl.textContent = totalPoints;
      level++;
      levelEl.textContent = level;
      statusEl.textContent = `+${earned} pts — new maze!`;
      statusEl.style.color = '#4caf50';
      draw();
      setTimeout(initGame, 900);
    }

    // ── Player movement ───────────────────────────────────────────────────────
    function tryMove(dc, dr) {
      if (!gameActive) return;
      const now = performance.now();
      if (now - lastMoveTime < MOVE_COOLDOWN) return;
      lastMoveTime = now;

      // Update facing direction
      if (dc ===  1) player.dir = 'right';
      if (dc === -1) player.dir = 'left';
      if (dr === -1) player.dir = 'up';
      if (dr ===  1) player.dir = 'down';

      // Wall check in current cell
      const w = maze[player.r][player.c];
      if (dc ===  1 && w.right)  { draw(); return; }
      if (dc === -1 && w.left)   { draw(); return; }
      if (dr === -1 && w.top)    { draw(); return; }
      if (dr ===  1 && w.bottom) { draw(); return; }

      player.r += dr;
      player.c += dc;
      markExplored(player.r, player.c);

      if (player.r === enemy.r && player.c === enemy.c) { caught(); return; }
      if (player.r === exitR && player.c === exitC) { win(); return; }

      draw();
    }

    // ── Enemy tick ────────────────────────────────────────────────────────────
    function enemyTick() {
      if (!gameActive) return;
      const next = bfsNextStep(enemy.r, enemy.c, player.r, player.c);
      if (next) { enemy.r = next.r; enemy.c = next.c; }
      if (enemy.r === player.r && enemy.c === player.c) { caught(); return; }
      draw();
    }

    // ── Init / reset ──────────────────────────────────────────────────────────
    function clearAllTimers() {
      clearInterval(enemyInterval);
      clearInterval(pulseInterval);
      clearInterval(timerInterval);
      clearTimeout(pulseOffTimeout);
      enemyPulsing = false;
    }

    function initGame() {
      clearAllTimers();
      maze     = generateMaze();
      explored = Array.from({length: ROWS}, () => Array(COLS).fill(false));
      player   = {r: 0, c: 0, dir: 'right'};

      // Place exit (Euclidean radius > 2 from player spawn)
      const exit = pickExit();
      exitR = exit.r; exitC = exit.c;

      // Place enemy (Euclidean radius > 3 from player spawn, not on exit)
      const en = pickEnemy();
      enemy = {r: en.r, c: en.c};

      gameActive = true;

      const speed = enemySpeed();
      const speedLabel = speed > 1200 ? 'slow' : speed > 600 ? 'medium' : speed > 300 ? 'fast' : 'very fast';
      statusEl.textContent = `Find the orange exit  ·  Enemy: ${speedLabel}`;
      statusEl.style.color = '#667';

      markExplored(0, 0);
      draw();

      // Level timer
      levelStartTime = performance.now();
      timerEl.textContent = '0.0s';
      timerInterval = setInterval(() => {
        const s = (performance.now() - levelStartTime) / 1000;
        timerEl.textContent = s.toFixed(1) + 's';
      }, 100);

      // Grace period before enemy starts — shrinks slightly each level
      const grace = Math.max(800, 1800 - (level - 1) * 100);
      setTimeout(() => {
        if (gameActive) enemyInterval = setInterval(enemyTick, speed);
      }, grace);

      // Enemy position pulse: first at 3s, then every 5s, lasts 1s each
      function triggerPulse() {
        if (!gameActive) return;
        enemyPulsing = true;
        draw();
        pulseOffTimeout = setTimeout(() => {
          enemyPulsing = false;
          draw();
        }, 1000);
      }
      setTimeout(() => {
        if (!gameActive) return;
        triggerPulse();
        pulseInterval = setInterval(triggerPulse, 5000);
      }, 3000);
    }

    function resetGame() {
      clearAllTimers();
      level = 1; levelEl.textContent = level;
      totalPoints = 0; pointsEl.textContent = 0;
      initGame();
    }

    // ── Keyboard input ────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp')    { e.preventDefault(); tryMove( 0, -1); }
      if (e.key === 'ArrowDown')  { e.preventDefault(); tryMove( 0,  1); }
      if (e.key === 'ArrowLeft')  { e.preventDefault(); tryMove(-1,  0); }
      if (e.key === 'ArrowRight') { e.preventDefault(); tryMove( 1,  0); }
    });

    // ── Start ─────────────────────────────────────────────────────────────────
    level = 1;
    initGame();
  </script>

</body>
</html>

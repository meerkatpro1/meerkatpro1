<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>meerkatpro1 — Welcome</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d1a;
      color: #fff;
    }

    nav {
      background: #1a1a2e;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav .logo {
      color: #943030;
      font-size: 1.2rem;
      font-weight: 700;
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    nav ul a {
      color: #ccc;
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    nav ul a:hover {
      color: #fff;
    }

    .page-header {
      text-align: center;
      padding: 2.5rem 2rem 1.5rem;
    }

    .page-header h1 {
      color: #fff;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }

    .page-header p {
      color: #aac4e0;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .grid-wrapper {
      max-width: 860px;
      margin: 0 auto;
      padding: 1rem 2rem 4rem;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .btn-grid a {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 130px;
      background: #1a4fa8;
      color: #fff;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid #2563eb;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      padding: 1rem;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .btn-grid a:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37,99,235,0.4);
    }

    .btn-grid a:active {
      transform: translateY(0);
      background: #1d4ed8;
    }

    .btn-grid a.featured {
      background: #1e40af;
      border-color: #3b82f6;
    }

    .btn-grid a.featured:hover {
      background: #3b82f6;
      box-shadow: 0 6px 24px rgba(59,130,246,0.5);
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="index.html">meerkatpro1</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>Welcome, Timo</h1>
    <p>Choose a page to explore</p>
  </div>

  <div class="grid-wrapper">
    <div class="btn-grid">

      <!-- Row 1 -->
      <a href="get-started.html" class="featured">Maze Run</a>
      <a href="#">About</a>
      <a href="#">Projects</a>

      <!-- Row 2 -->
      <a href="#">Contact</a>
      <a href="#">Blog</a>
      <a href="#">Portfolio</a>

      <!-- Row 3 -->
      <a href="#">Gallery</a>
      <a href="#">Events</a>
      <a href="#">News</a>

      <!-- Row 4 -->
      <a href="#">Resources</a>
      <a href="#">Community</a>
      <a href="#">Tools</a>

      <!-- Row 5 -->
      <a href="#">Settings</a>
      <a href="#">Help</a>
      <a href="#">More</a>

    </div>
  </div>

</body>
</html>

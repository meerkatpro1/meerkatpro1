<!doctype html>
<html>
<head>
  <meta charset="utf-8">

  <!-- PolyTrack v0.5.2 assets served from Kodub's CDN -->
  <base href="https://app-polytrack.kodub.com/0.5.2/">

  <link rel="preload" href="forced_square.woff2" as="font" type="font/woff2" crossorigin="anonymous"/>
  <link rel="preload" href="images/logo.svg" as="image" type="image/svg+xml"/>
  <link rel="preload" href="images/discord.svg" as="image" type="image/svg+xml"/>
  <link rel="manifest" href="manifest.json"/>

  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">

  <title>PolyTrack — meerkatpro1</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    nav {
      background: #1a1a2e;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 50px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      position: relative;
      z-index: 10;
    }

    nav .logo {
      color: #943030;
      font-size: 1.2rem;
      font-weight: 700;
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    nav ul a {
      color: #ccc;
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    nav ul a:hover { color: #fff; }

    #game-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* PolyTrack expects canvas + ui divs to fill the viewport */
    #screen {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    #ui, #transition-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
  </style>

  <script defer src="error_screen.bundle.js"></script>
  <script defer src="main.bundle.js"></script>
</head>
<body>

  <nav>
    <a class="logo" href="index.html">meerkatpro1</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <div id="game-container">
    <canvas id="screen"></canvas>
    <div id="ui"></div>
    <div id="transition-layer"></div>
  </div>

</body>
</html>
